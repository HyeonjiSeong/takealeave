<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내원경로 매출 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:        #F7F8FC;
  --surface:   #FFFFFF;
  --surface2:  #F0F2F8;
  --border:    #E4E7F0;
  --text:      #1A1D2E;
  --text-sub:  #6B7280;
  --text-mute: #9CA3AF;
  --accent:    #4F6EF7;
  --accent-dim:#EEF1FE;
  --radius:    12px;
  --font-mono: 'DM Mono', monospace;
}

html { font-size: 14px; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 30;
  box-shadow: 0 1px 8px rgba(0,0,0,0.04);
}
.header-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 16px; font-weight: 700; color: var(--text);
  letter-spacing: -0.5px;
}
.header-logo-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
}
.add-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 8px;
  border: 1px solid var(--accent);
  background: var(--accent); color: white;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s ease;
}
.add-btn:hover { opacity: 0.88; }

/* ── MAIN ── */
.main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

/* ── KPI CARDS ── */
.kpi-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 16px; margin-bottom: 24px;
}
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.03);
}
.kpi-label {
  font-size: 11px; font-weight: 600;
  color: var(--text-mute); letter-spacing: 0.4px;
  text-transform: uppercase; margin-bottom: 8px;
}
.kpi-value {
  font-family: var(--font-mono);
  font-size: 22px; font-weight: 500;
  color: var(--text); letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.kpi-sub {
  font-size: 11px; color: var(--text-mute);
}

/* ── MONTH TABS ── */
.tab-bar {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 20px;
}
.tab-btn {
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface); color: var(--text-sub);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.15s ease;
}
.tab-btn:hover { border-color: var(--accent); color: var(--accent); }
.tab-btn.active {
  background: var(--accent); color: white;
  border-color: var(--accent);
}

/* ── CHARTS ROW ── */
.charts-row {
  display: grid; grid-template-columns: 1fr 340px;
  gap: 16px; margin-bottom: 20px;
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.03);
}
.chart-title {
  font-size: 13px; font-weight: 700;
  color: var(--text); margin-bottom: 18px;
}
.chart-wrap { position: relative; }
.bar-wrap { height: 280px; }
.donut-wrap { height: 240px; display: flex; align-items: center; justify-content: center; }

/* ── TABLE ── */
.table-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.03);
}
.table-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 13px; font-weight: 700; color: var(--text);
  display: flex; align-items: center; justify-content: space-between;
}
.table-period {
  font-size: 11px; font-weight: 500;
  color: var(--text-mute); font-family: var(--font-mono);
}
.tbl { width: 100%; border-collapse: collapse; }
.tbl th {
  padding: 10px 16px;
  background: var(--surface2);
  font-size: 11px; font-weight: 700;
  color: var(--text-mute); text-align: right;
  letter-spacing: 0.3px;
  border-bottom: 1px solid var(--border);
}
.tbl th:first-child { text-align: left; }
.tbl td {
  padding: 10px 16px;
  font-size: 12px; color: var(--text-sub);
  text-align: right;
  border-bottom: 1px solid var(--border);
}
.tbl td:first-child { text-align: left; font-weight: 600; color: var(--text); }
.tbl tr:last-child td { border-bottom: none; font-weight: 700; color: var(--text); background: var(--surface2); }
.tbl tr:hover td { background: var(--bg); }
.tbl tr:last-child:hover td { background: var(--surface2); }
.ratio-bar {
  display: inline-block;
  height: 4px; border-radius: 2px;
  background: var(--accent); opacity: 0.3;
  margin-right: 6px; vertical-align: middle;
}

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  align-items: flex-start; justify-content: center;
  padding: 40px 20px; overflow-y: auto;
}
.modal-overlay.open { display: flex; animation: fadeIn 0.15s ease; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 100%; max-width: 560px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  animation: slideUp 0.2s ease;
}
.modal-title {
  font-size: 16px; font-weight: 700;
  margin-bottom: 20px; color: var(--text);
}
.form-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 16px;
}
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label {
  font-size: 11px; font-weight: 600;
  color: var(--text-mute); letter-spacing: 0.3px;
}
.form-input {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; color: var(--text);
  background: var(--surface);
  transition: border-color 0.15s;
}
.form-input:focus { outline: none; border-color: var(--accent); }
.form-divider {
  font-size: 11px; font-weight: 700;
  color: var(--text-mute); letter-spacing: 0.5px;
  text-transform: uppercase;
  margin: 18px 0 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.route-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 20px;
}
.modal-actions {
  display: flex; gap: 8px; justify-content: flex-end;
}
.btn-cancel {
  padding: 9px 20px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2); color: var(--text-sub);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.btn-cancel:hover { border-color: var(--accent); color: var(--accent); }
.btn-save {
  padding: 9px 20px; border-radius: 8px;
  border: none;
  background: var(--accent); color: white;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.btn-save:hover { opacity: 0.88; }

/* ── DELETE MONTH ── */
.delete-btn {
  font-size: 10px; color: #EF4444;
  background: #FEE2E2; border: none;
  padding: 2px 8px; border-radius: 4px;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  font-weight: 600; transition: opacity 0.15s;
}
.delete-btn:hover { opacity: 0.7; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── ANIM ── */
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

@media (max-width: 1100px) {
  .charts-row { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .main { padding: 16px; }
  .header { padding: 0 16px; }
  .kpi-row { grid-template-columns: 1fr 1fr; }
  .route-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">
    <div class="header-logo-dot"></div>
    내원경로 매출 현황
  </div>
  <button class="add-btn" onclick="openAddModal()">🔒 데이터 추가</button>
</header>

<div class="main">

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">기간 총 매출</div>
      <div class="kpi-value" id="kpiTotal">—</div>
      <div class="kpi-sub" id="kpiTotalSub"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">월 평균 매출</div>
      <div class="kpi-value" id="kpiAvg">—</div>
      <div class="kpi-sub" id="kpiAvgSub"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">최고 내원경로</div>
      <div class="kpi-value" id="kpiTop">—</div>
      <div class="kpi-sub" id="kpiTopSub"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">집계 월수</div>
      <div class="kpi-value" id="kpiMonths">—</div>
      <div class="kpi-sub" id="kpiMonthsSub"></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tab-bar" id="tabBar"></div>

  <!-- CHARTS -->
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title" id="barTitle">월별 총 매출</div>
      <div class="chart-wrap bar-wrap">
        <canvas id="barChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">내원경로별 비율</div>
      <div class="chart-wrap donut-wrap">
        <canvas id="donutChart"></canvas>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div class="table-header">
      <span>내원경로별 매출 상세</span>
      <span class="table-period" id="tablePeriod"></span>
    </div>
    <div style="overflow-x:auto;">
      <table class="tbl" id="dataTable"></table>
    </div>
  </div>

</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">📊 월 데이터 추가</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">연도</label>
        <input class="form-input" id="inputYear" type="number" value="2026" min="2020" max="2099" placeholder="2026">
      </div>
      <div class="form-group">
        <label class="form-label">월</label>
        <input class="form-input" id="inputMonth" type="number" value="4" min="1" max="12" placeholder="4">
      </div>
    </div>
    <div class="form-divider">내원경로별 매출액 (원)</div>
    <div class="route-grid" id="routeInputs"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveData()">저장</button>
    </div>
  </div>
</div>

<script>
/* ── CONFIG ── */
const ADMIN_PW = '1212';
const STORAGE_KEY = 'revenue_extra_data';

/* ── 내원경로 ── */
const ROUTES = [
  '내원 고객 소개','직원소개','미내원 고객 소개','간판','워크인',
  '네이버','유튜브','카카오채널','인스타그램','카페','블로그',
  '다음','VIP초대권','기타','킵스고객','홈페이지DB','틱톡'
];

const ROUTE_COLORS = [
  '#4F6EF7','#F59E0B','#10B981','#EF4444','#8B5CF6',
  '#EC4899','#06B6D4','#84CC16','#F97316','#6366F1',
  '#14B8A6','#F43F5E','#A855F7','#22C55E','#EAB308',
  '#3B82F6','#94A3B8'
];

/* ── 기본 데이터 ── */
const BASE_DATA = {
  '2026-01': {
    '내원 고객 소개': 323705400, '직원소개': 3891330, '미내원 고객 소개': 73310460,
    '간판': 29625040, '워크인': 41921430, '네이버': 220880820, '유튜브': 58469510,
    '카카오채널': 1540000, '인스타그램': 61449450, '카페': 27241370, '블로그': 48336740,
    '다음': 296000, 'VIP초대권': 3113000, '기타': 33479840, '킵스고객': 12208900,
    '홈페이지DB': 0, '틱톡': 2149000
  },
  '2026-02': {
    '내원 고객 소개': 329747150, '직원소개': 14555280, '미내원 고객 소개': 41315810,
    '간판': 48884610, '워크인': 7038840, '네이버': 211761150, '유튜브': 96492840,
    '카카오채널': 3539000, '인스타그램': 80217900, '카페': 61263110, '블로그': 38659500,
    '다음': 5000000, 'VIP초대권': 0, '기타': 25412770, '킵스고객': 11994110,
    '홈페이지DB': 11297000, '틱톡': 1754000
  },
  '2026-03': {
    '내원 고객 소개': 435730470, '직원소개': 23072600, '미내원 고객 소개': 40159800,
    '간판': 49079600, '워크인': 27259610, '네이버': 117142850, '유튜브': 46077960,
    '카카오채널': 6264320, '인스타그램': 48159000, '카페': 14714310, '블로그': 41953870,
    '다음': 12322980, 'VIP초대권': 0, '기타': 11264120, '킵스고객': 3471140,
    '홈페이지DB': 8526000, '틱톡': 0
  }
};

/* ── STATE ── */
let selectedTab = '전체';
let barChart = null;
let donutChart = null;
let isUnlocked = false;

/* ── DATA MERGE ── */
function getAllData() {
  const extra = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  return { ...BASE_DATA, ...extra };
}

function getSortedKeys() {
  return Object.keys(getAllData()).sort();
}

function getMonthLabel(key) {
  const [y, m] = key.split('-');
  return `${y}년 ${parseInt(m)}월`;
}

function getDataForPeriod() {
  const all = getAllData();
  if (selectedTab === '전체') {
    const merged = {};
    ROUTES.forEach(r => {
      merged[r] = Object.values(all).reduce((sum, mo) => sum + (mo[r] || 0), 0);
    });
    return merged;
  }
  return all[selectedTab] || {};
}

function getTotal(data) {
  return ROUTES.reduce((s, r) => s + (data[r] || 0), 0);
}

/* ── FORMAT ── */
function fmt(n) {
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
  if (n >= 10000) return Math.round(n / 10000).toLocaleString() + '만';
  return n.toLocaleString();
}
function fmtFull(n) { return n.toLocaleString() + '원'; }
function fmtPct(n, total) {
  if (!total) return '0.00%';
  return (n / total * 100).toFixed(2) + '%';
}

/* ── TABS ── */
function renderTabs() {
  const keys = getSortedKeys();
  const bar = document.getElementById('tabBar');
  let html = `<button class="tab-btn ${selectedTab==='전체'?'active':''}" onclick="selectTab('전체')">전체</button>`;
  keys.forEach(k => {
    html += `<button class="tab-btn ${selectedTab===k?'active':''}" onclick="selectTab('${k}')">${getMonthLabel(k)}</button>`;
  });
  bar.innerHTML = html;
}

function selectTab(key) {
  selectedTab = key;
  renderTabs();
  renderKPI();
  renderBarChart();
  renderDonutChart();
  renderTable();
}

/* ── KPI ── */
function renderKPI() {
  const all = getAllData();
  const keys = getSortedKeys();
  const data = getDataForPeriod();
  const total = getTotal(data);

  // 총 매출
  document.getElementById('kpiTotal').textContent = fmt(total) + '원';
  document.getElementById('kpiTotalSub').textContent = selectedTab === '전체'
    ? `${keys.length}개월 누적` : getMonthLabel(selectedTab);

  // 월 평균
  const monthCount = selectedTab === '전체' ? keys.length : 1;
  document.getElementById('kpiAvg').textContent = fmt(Math.round(total / monthCount)) + '원';
  document.getElementById('kpiAvgSub').textContent = selectedTab === '전체'
    ? `${keys.length}개월 기준` : '단월 기준';

  // 최고 경로
  let topRoute = '', topVal = 0;
  ROUTES.forEach(r => { if ((data[r] || 0) > topVal) { topVal = data[r] || 0; topRoute = r; } });
  document.getElementById('kpiTop').textContent = topRoute || '—';
  document.getElementById('kpiTopSub').textContent = topVal ? `${fmt(topVal)}원 (${fmtPct(topVal, total)})` : '';

  // 집계 월수
  document.getElementById('kpiMonths').textContent = keys.length + '개월';
  document.getElementById('kpiMonthsSub').textContent = keys.length > 0
    ? `${getMonthLabel(keys[0])} ~ ${getMonthLabel(keys[keys.length-1])}` : '';
}

/* ── BAR CHART ── */
function renderBarChart() {
  const all = getAllData();
  const keys = getSortedKeys();

  const labels = keys.map(getMonthLabel);
  const values = keys.map(k => getTotal(all[k]));
  const bgColors = keys.map(k =>
    k === selectedTab ? '#4F6EF7' : 'rgba(79,110,247,0.25)'
  );

  document.getElementById('barTitle').textContent = '월별 총 매출';

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: bgColors,
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + fmtFull(ctx.raw)
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { family: 'Noto Sans KR', size: 11 }, color: '#9CA3AF' }
        },
        y: {
          grid: { color: '#F0F2F8' },
          ticks: {
            font: { family: 'DM Mono', size: 10 }, color: '#9CA3AF',
            callback: v => fmt(v)
          }
        }
      }
    }
  });
}

/* ── DONUT CHART ── */
function renderDonutChart() {
  const data = getDataForPeriod();
  const total = getTotal(data);
  const vals = ROUTES.map(r => data[r] || 0);

  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: {
      labels: ROUTES,
      datasets: [{
        data: vals,
        backgroundColor: ROUTE_COLORS,
        borderWidth: 2,
        borderColor: '#fff',
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: ${fmtPct(ctx.raw, total)} (${fmt(ctx.raw)}원)`
          }
        }
      }
    }
  });
}

/* ── TABLE ── */
function renderTable() {
  const all = getAllData();
  const keys = getSortedKeys();
  const data = getDataForPeriod();
  const total = getTotal(data);

  // 기간 레이블
  document.getElementById('tablePeriod').textContent =
    selectedTab === '전체' ? `전체 ${keys.length}개월` : getMonthLabel(selectedTab);

  // 헤더
  let thead = '<thead><tr><th>내원경로</th><th>매출액</th><th>비율</th></tr></thead>';

  // 바디
  const sorted = [...ROUTES].sort((a, b) => (data[b] || 0) - (data[a] || 0));
  let tbody = '<tbody>';
  sorted.forEach((r, i) => {
    const val = data[r] || 0;
    const pct = total ? (val / total * 100) : 0;
    const barW = Math.round(pct * 1.2);
    tbody += `<tr>
      <td>
        <span class="ratio-bar" style="width:${barW}px;background:${ROUTE_COLORS[ROUTES.indexOf(r)]}"></span>
        ${r}
      </td>
      <td>${val.toLocaleString()}</td>
      <td>${pct.toFixed(2)}%</td>
    </tr>`;
  });
  tbody += `<tr>
    <td>합계</td>
    <td>${total.toLocaleString()}</td>
    <td>100%</td>
  </tr></tbody>`;

  document.getElementById('dataTable').innerHTML = thead + tbody;
}

/* ── MODAL ── */
function openAddModal() {
  if (!isUnlocked) {
    const pw = prompt('비밀번호를 입력하세요.');
    if (pw === null) return;
    if (pw !== ADMIN_PW) { alert('비밀번호가 올바르지 않습니다.'); return; }
    isUnlocked = true;
  }
  // 다음 미입력 월 자동 세팅
  const keys = getSortedKeys();
  if (keys.length > 0) {
    const last = keys[keys.length - 1];
    const [y, m] = last.split('-').map(Number);
    let ny = y, nm = m + 1;
    if (nm > 12) { nm = 1; ny++; }
    document.getElementById('inputYear').value = ny;
    document.getElementById('inputMonth').value = nm;
  }

  // 경로 입력 필드
  const grid = document.getElementById('routeInputs');
  grid.innerHTML = ROUTES.map(r =>
    `<div class="form-group">
      <label class="form-label">${r}</label>
      <input class="form-input" id="ri_${r.replace(/\s/g,'_')}" type="number" min="0" value="0" placeholder="0">
    </div>`
  ).join('');

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveData() {
  const y = parseInt(document.getElementById('inputYear').value);
  const m = parseInt(document.getElementById('inputMonth').value);
  if (!y || !m || m < 1 || m > 12) { alert('연도와 월을 올바르게 입력하세요.'); return; }

  const key = `${y}-${String(m).padStart(2,'0')}`;
  const extra = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if (extra[key] || BASE_DATA[key]) {
    if (!confirm(`${getMonthLabel(key)} 데이터가 이미 있습니다. 덮어쓸까요?`)) return;
  }

  const entry = {};
  ROUTES.forEach(r => {
    const v = parseInt(document.getElementById(`ri_${r.replace(/\s/g,'_')}`).value) || 0;
    entry[r] = v;
  });

  extra[key] = entry;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(extra));
  closeModal();
  selectTab(key);
}

/* ── INIT ── */
function init() {
  renderTabs();
  renderKPI();
  renderBarChart();
  renderDonutChart();
  renderTable();
}

init();
</script>
